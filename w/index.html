<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Boxerium workout</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; background:#101014;
           color:#fff; margin:0; display:flex; min-height:100vh;
           align-items:center; justify-content:center; text-align:center; }
    .card { padding:32px 24px; max-width:340px; }
    h1 { font-size:22px; margin:0 0 8px; }
    p { color:#b9b9c2; line-height:1.4; }
    a.btn { display:block; margin:14px 0 0; padding:14px 18px; border-radius:12px;
            background:#B99776; color:#101014; font-weight:700;
            text-decoration:none; }
    a.alt { background:transparent; color:#B99776; border:1px solid #B99776; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Someone shared a Boxerium workout</h1>
    <p>Open it in the Boxerium app to add it to your workouts.</p>
    <a class="btn" id="open" href="#">Open in Boxerium</a>
    <a class="alt btn" href="https://apps.apple.com/app/id6771237868">Get Boxerium</a>
  </div>
  <script>
    // Forward the ?d= payload to the custom scheme so the app imports it
    // even if Universal Links aren't wired up on this device yet.
    var d = new URLSearchParams(location.search).get('d') || '';
    var deep = 'boxerium://w?d=' + encodeURIComponent(d);
    document.getElementById('open').href = deep;
    // Auto-attempt the deep link on load.
    if (d) { window.location.href = deep; }
  </script>
</body>
</html>
